name: Claude Code

on:
  # Auto-review on PR open/update
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  # Interactive @claude mentions in PR/issue comments
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]

concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  # Auto-review on PR events
  review:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request and post actionable feedback.
            Prioritize:
            - correctness and regression risk
            - security and data exposure
            - performance and scalability concerns
            - missing tests for changed behavior

            Guidance:
            - Prefer inline comments for specific issues.
            - Leave a concise top-level summary comment.
            - If no meaningful issues are found, say so explicitly.
            - Do not post speculative or low-confidence findings.

  # Interactive @claude mentions
  claude:
    if: >
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.head_ref }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_non_write_users: "alee046"
          track_progress: true
          timeout_minutes: 25
